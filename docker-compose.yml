services:
  postgres:
    image: postgres:16-alpine
    container_name: creativejudge-db
    environment:
      POSTGRES_DB: creativejudge
      POSTGRES_USER: cjuser
      POSTGRES_PASSWORD: cjpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
