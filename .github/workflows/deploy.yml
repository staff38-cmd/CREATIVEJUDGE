name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync built files to server
        run: |
          rsync -az --delete .next/ ubuntu@${{ secrets.SERVER_HOST }}:~/app/.next/
          rsync -az package.json package-lock.json ubuntu@${{ secrets.SERVER_HOST }}:~/app/

      - name: Install runtime deps & restart pm2
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} "cd ~/app && npm ci --omit=dev --prefer-offline && pm2 restart all --update-env"
