
name: Deploy to Lightsail

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            git pull origin main
            npm install
            npm run build
            pm2 restart ecosystem.config.js

            # Nginx の upload size 上限を更新（初回・毎回冪等に適用）
            if command -v nginx >/dev/null 2>&1; then
              CONF=""
              [ -f /etc/nginx/sites-enabled/default ] && CONF="/etc/nginx/sites-enabled/default"
              [ -z "$CONF" ] && [ -f /etc/nginx/conf.d/default.conf ] && CONF="/etc/nginx/conf.d/default.conf"
              if [ -n "$CONF" ]; then
                if grep -q "client_max_body_size" "$CONF"; then
                  sudo sed -i 's/client_max_body_size[^;]*;/client_max_body_size 600M;/g' "$CONF"
                else
                  sudo sed -i '/listen 80/a\    client_max_body_size 600M;' "$CONF"
                fi
                sudo nginx -t && sudo nginx -s reload
              fi
            fi
