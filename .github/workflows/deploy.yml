
name: Deploy to Lightsail



on:

  push:

    branches:

      - main



jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to server

        uses: appleboy/ssh-action@v1.0.0

        with:

          host: ${{ secrets.SERVER_IP }}

          username: ubuntu

          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |

            cd ~/app

            git pull origin main

            npm install

            npm run build

            pm2 restart ecosystem.config.js

