name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync built files to server
        run: |
          rsync -az --delete .next/ ubuntu@${{ secrets.SERVER_IP }}:~/app/.next/
          rsync -az package.json package-lock.json ubuntu@${{ secrets.SERVER_IP }}:~/app/
          rsync -az prisma/ ubuntu@${{ secrets.SERVER_IP }}:~/app/prisma/
          rsync -az prisma.config.ts ubuntu@${{ secrets.SERVER_IP }}:~/app/

      - name: Install runtime deps, migrate DB & restart pm2
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "cd ~/app && npm ci --omit=dev --prefer-offline && mkdir -p src/generated/prisma && DATABASE_URL='${{ secrets.DATABASE_URL }}' npx prisma db push && pm2 startOrRestart ecosystem.config.js --update-env"
